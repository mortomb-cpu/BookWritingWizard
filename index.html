          <div class="card" style="text-align:center;padding:48px;">
            <p style="font-size:48px;margin-bottom:16px;">&#128247;</p>
            <p style="color:var(--text2);">No images yet. Add images from the chapter editor.</p>
          </div>
        `}
      </div>
    </div>
  `;
}

function renderChapterImages(ch, idx) {
  if (!ch.images.length) return '';
  return `<div style="margin-top:24px;">
    <h3 style="color:var(--gold);margin-bottom:12px;font-size:16px;">Images</h3>
    <div class="image-grid">
      ${ch.images.map((img,i) => `
        <div class="image-card">
          <img src="${img.data}" alt="${esc(img.caption||'')}">
          <div class="caption">
            ${esc(img.caption||'No caption')}
            <button style="float:right;background:none;border:none;color:var(--red);cursor:pointer;" onclick="event.stopPropagation();removeImage(${idx},${i})">&times;</button>
          </div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function addImageToChapter(idx) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const data = await compressImage(file);
      const caption = prompt('Add a caption for this image (optional):') || '';
      const placement = prompt('Placement notes (e.g., "next to paragraph about Cuban tobacco"):') || '';
      const p = getProject();
      p.chapters[idx].images.push({
        id: Date.now().toString(36),
        data: data,
        caption: caption,
        placement: placement
      });
      saveProject();
      navigate('chapter', { chapterIdx: idx });
    } catch(err) {
      showModal('Error', 'Failed to process image: ' + err.message, [{ label: 'OK', cls: 'btn-gold' }]);
    }
  };
  input.click();
}

function removeImage(idx, imgIdx) {
  const p = getProject();
  p.chapters[idx].images.splice(imgIdx, 1);
  saveProject();
  navigate('chapter', { chapterIdx: idx });
}

function viewImage(id) {
  const p = getProject();
  let img = null;
  p.chapters.forEach(ch => { ch.images.forEach(i => { if (i.id === id) img = i; }); });
  if (!img) return;
  const overlay = document.getElementById('modal-overlay');
  overlay.innerHTML = `<div style="max-width:90vw;max-height:90vh;position:relative;">
    <img src="${img.data}" style="max-width:100%;max-height:80vh;border-radius:var(--radius);">
    <p style="text-align:center;margin-top:12px;color:var(--text);">${esc(img.caption||'')}</p>
    ${img.placement ? `<p style="text-align:center;color:var(--text3);font-size:13px;">${esc(img.placement)}</p>` : ''}
    <button class="btn btn-ghost" style="position:absolute;top:-40px;right:0;" onclick="hideModal()">Close</button>
  </div>`;
  overlay.classList.add('show');
}

// ============================================================
// VIEW: READ BACK MODE
// ============================================================
function renderReadback(app) {
  const p = getProject();
  if (!p) return navigate('home');

  const chaptersWithContent = p.chapters.filter(c => c.content);
  if (!chaptersWithContent.length) {
    app.innerHTML = `
      <div class="header">
        <div class="logo">BOOK <span>WIZARD</span></div>
        <div class="header-actions ui"><button class="btn btn-ghost btn-sm" onclick="navigate('project')">Back</button></div>
      </div>
      <div class="center-screen">
        <div class="center-box">
          <p style="font-size:48px;margin-bottom:16px;">&#128214;</p>
          <h2>Nothing to Read Yet</h2>
          <p>Write or generate at least one chapter to use Read Back mode.</p>
          <button class="btn btn-gold" onclick="navigate('project')">Back to Dashboard</button>
        </div>
      </div>
    `;
    return;
  }

  const allContent = chaptersWithContent.map(c => `<h1>Chapter ${c.number}: ${esc(c.title)}</h1>\n${md(c.content)}\n<hr style="border-color:var(--border);margin:48px 0;">`).join('');

  app.innerHTML = `
    <div class="readback-overlay">
      <button class="btn btn-ghost readback-close" onclick="navigate('project')">Exit Read Back</button>
      <div class="readback-content">${allContent}</div>
    </div>
  `;
}

// ============================================================
// VIEW: EXPORT
// ============================================================
function renderExport(app) {
  const p = getProject();
  if (!p) return navigate('home');

  app.innerHTML = `
    <div class="header">
      <div class="logo">BOOK <span>WIZARD</span></div>
      <div class="header-actions ui">
        <button class="btn btn-ghost btn-sm" onclick="navigate('project')">Dashboard</button>
      </div>
    </div>
    <div class="main">
      ${renderProjectSidebar(p, 'export')}
      <div class="content-area" style="padding:32px;">
        <h2 style="color:var(--gold);margin-bottom:8px;">Export Manuscript</h2>
        <p style="color:var(--text3);margin-bottom:32px;" class="ui">Download your book as a complete manuscript file.</p>

        <div style="display:flex;gap:16px;flex-wrap:wrap;">
          <div class="card" style="flex:1;min-width:200px;cursor:pointer;text-align:center;" onclick="exportMarkdown()">
            <p style="font-size:36px;margin-bottom:8px;">&#128196;</p>
            <h3 style="color:var(--text);margin-bottom:4px;">Markdown</h3>
            <p style="font-size:13px;color:var(--text3);" class="ui">Best for importing into Word, Google Docs, or other tools</p>
          </div>
          <div class="card" style="flex:1;min-width:200px;cursor:pointer;text-align:center;" onclick="exportPlainText()">
            <p style="font-size:36px;margin-bottom:8px;">&#128221;</p>
            <h3 style="color:var(--text);margin-bottom:4px;">Plain Text</h3>
            <p style="font-size:13px;color:var(--text3);" class="ui">Simple text file, universally compatible</p>
          </div>
          <div class="card" style="flex:1;min-width:200px;cursor:pointer;text-align:center;" onclick="exportProjectBackup()">
            <p style="font-size:36px;margin-bottom:8px;">&#128190;</p>
            <h3 style="color:var(--text);margin-bottom:4px;">Full Backup</h3>
            <p style="font-size:13px;color:var(--text3);" class="ui">JSON backup of entire project data</p>
          </div>
        </div>

        <div class="card" style="margin-top:32px;">
          <h3 style="color:var(--gold);margin-bottom:12px;">Import Backup</h3>
          <p style="color:var(--text3);font-size:14px;margin-bottom:12px;" class="ui">Restore a project from a backup file.</p>
          <input type="file" accept=".json" id="import-file" style="display:none;" onchange="importBackup(this)">
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()">Choose Backup File</button>
        </div>

        <div class="card" style="margin-top:16px;">
          <h3 style="color:var(--text);margin-bottom:8px;">Storage Info</h3>
          <p style="font-size:13px;color:var(--text3);" class="ui">Using approximately ${(new Blob([JSON.stringify(state)]).size / 1024).toFixed(0)} KB of local storage.</p>
        </div>
      </div>
    </div>
  `;
}

function exportMarkdown() {
  const p = getProject();
  let content = `# ${p.name}\n\n`;
  content += `---\n\n`;

  p.chapters.forEach(ch => {
    if (ch.content) {
      content += `## Chapter ${ch.number}: ${ch.title}\n\n`;
      content += ch.content + '\n\n';
      if (ch.images.length) {
        ch.images.forEach(img => {
          content += `[Image: ${img.caption || 'Untitled'}${img.placement ? ' - ' + img.placement : ''}]\n\n`;
        });
      }
      content += `---\n\n`;
    }
  });

  if (p.glossary.length) {
    content += `## Glossary\n\n`;
    p.glossary.sort((a,b) => a.term.localeCompare(b.term)).forEach(g => {
      content += `**${g.term}**: ${g.definition}\n\n`;
    });
  }

  downloadFile(`${p.name.replace(/[^a-zA-Z0-9]/g,'_')}_manuscript.md`, content, 'text/markdown');
}

function exportPlainText() {
  const p = getProject();
  let content = `${p.name}\n${'='.repeat(p.name.length)}\n\n`;

  p.chapters.forEach(ch => {
    if (ch.content) {
      content += `Chapter ${ch.number}: ${ch.title}\n${'-'.repeat(40)}\n\n`;
      content += ch.content + '\n\n\n';
    }
  });

  if (p.glossary.length) {
    content += `Glossary\n${'-'.repeat(40)}\n\n`;
    p.glossary.sort((a,b) => a.term.localeCompare(b.term)).forEach(g => {
      content += `${g.term}: ${g.definition}\n\n`;
    });
  }

  downloadFile(`${p.name.replace(/[^a-zA-Z0-9]/g,'_')}_manuscript.txt`, content, 'text/plain');
}

function exportProjectBackup() {
  const p = getProject();
  downloadFile(`${p.name.replace(/[^a-zA-Z0-9]/g,'_')}_backup.json`, JSON.stringify(p, null, 2), 'application/json');
}

function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.name || !data.chapters) throw new Error('Invalid backup');
      data.id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2);
      data.createdAt = new Date().toISOString();
      state.projects.push(data);
      state.currentProjectId = data.id;
      saveState();
      showModal('Imported!', `"${data.name}" has been restored.`, [{ label: 'Open', cls: 'btn-gold', fn: () => navigate('project') }]);
    } catch(err) {
      showModal('Import Failed', 'The file does not appear to be a valid Book Wizard backup: ' + err.message, [{ label: 'OK', cls: 'btn-gold' }]);
    }
  };
  reader.readAsText(file);
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// VERSION HISTORY
// ============================================================
function showVersions(idx) {
  const p = getProject();
  const ch = p.chapters[idx];
  const overlay = document.getElementById('modal-overlay');
  overlay.innerHTML = `<div class="modal" style="max-width:600px;">
    <h2>Version History</h2>
    <p style="margin-bottom:16px;">Chapter ${ch.number}: ${esc(ch.title)}</p>
    <div style="max-height:400px;overflow-y:auto;">
      ${ch.versions.map((v,i) => `
        <div class="card" style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-size:14px;">${esc(v.label || 'Version ' + (i+1))}</div>
            <div style="font-size:12px;color:var(--text3);" class="ui">${formatDate(v.timestamp)} &middot; ${wordCount(v.content).toLocaleString()} words</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="restoreVersion(${idx},${i})">Restore</button>
        </div>
      `).join('')}
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn-ghost" onclick="hideModal()">Close</button>
    </div>
  </div>`;
  overlay.classList.add('show');
}

function restoreVersion(idx, versionIdx) {
  showModal('Restore Version?', 'This will replace the current chapter content with this version. The current content will be saved as a new version.', [
    { label: 'Cancel', cls: 'btn-ghost' },
    { label: 'Restore', cls: 'btn-gold', fn: () => {
      const p = getProject();
      const ch = p.chapters[idx];
      ch.versions.push({ content: ch.content, timestamp: new Date().toISOString(), label: 'Before restore' });
      ch.content = ch.versions[versionIdx].content;
      saveProject();
      hideModal();
      navigate('chapter', { chapterIdx: idx });
    }}
  ]);
}

// ============================================================
render();
