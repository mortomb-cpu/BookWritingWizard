<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Moran Tomer">

<meta name="description" content="Book Wizard - AI-powered book writing assistant by Moran Tomer">
<title>Book Wizard — by Moran Tomer</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252542;
  --card: #16213e;
  --gold: #d4a853;
  --gold-light: #e8c776;
  --gold-dark: #b8922f;
  --text: #e8e0d4;
  --text2: #a0978c;
  --text3: #6b6360;
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
  --border: #2a2a4a;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--text); font-family:Georgia,'Times New Roman',serif; }
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:var(--text3); }
#app { height:100vh; display:flex; flex-direction:column; }
.ui { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; border:none; border-radius:var(--radius); font-size:15px; font-family:inherit; cursor:pointer; transition:all .2s; font-weight:600; }
.btn-gold { background:var(--gold); color:#0f0f1a; }
.btn-gold:hover { background:var(--gold-light); transform:translateY(-1px); box-shadow:0 4px 16px rgba(212,168,83,0.3); }
.btn-outline { background:transparent; color:var(--gold); border:2px solid var(--gold); }
.btn-outline:hover { background:rgba(212,168,83,0.1); }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--surface2); color:var(--text); }
.btn-danger { background:transparent; color:var(--red); border:1px solid var(--red); }
.btn-danger:hover { background:rgba(248,113,113,0.1); }
.btn-sm { padding:8px 16px; font-size:13px; }
.btn-lg { padding:16px 36px; font-size:17px; }
.btn:disabled { opacity:0.4; cursor:not-allowed; transform:none !important; }

/* Inputs */
input[type="text"], input[type="password"], textarea {
  background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 16px; font-size:15px; font-family:inherit; width:100%; outline:none; transition:border-color .2s;
}
input:focus, textarea:focus { border-color:var(--gold); }
textarea { resize:vertical; min-height:100px; line-height:1.7; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
.card:hover { border-color:var(--surface2); }
.card-gold { border-color:var(--gold-dark); }
.card-gold:hover { border-color:var(--gold); }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.header .logo { font-size:20px; color:var(--gold); font-weight:700; letter-spacing:1px; }
.header .logo span { color:var(--text); font-weight:400; }
.header-actions { display:flex; align-items:center; gap:12px; }

/* Phase Steps */
.steps { display:flex; align-items:center; gap:4px; }
.step { display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:20px; font-size:13px; color:var(--text3); font-family:-apple-system,sans-serif; transition:all .2s; cursor:pointer; }
.step.active { background:rgba(212,168,83,0.15); color:var(--gold); }
.step.done { color:var(--green); }
.step-num { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; border:2px solid currentColor; }
.step.active .step-num { background:var(--gold); color:var(--bg); border-color:var(--gold); }
.step.done .step-num { background:var(--green); color:var(--bg); border-color:var(--green); }
.step-arrow { color:var(--text3); font-size:16px; }

/* Layout */
.main { flex:1; display:flex; overflow:hidden; }
.sidebar { width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
.sidebar-section { padding:16px; border-bottom:1px solid var(--border); }
.sidebar-title { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--text3); margin-bottom:12px; font-family:-apple-system,sans-serif; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; transition:all .15s; color:var(--text2); font-size:14px; font-family:-apple-system,sans-serif; }
.sidebar-item:hover { background:var(--surface2); color:var(--text); }
.sidebar-item.active { background:rgba(212,168,83,0.12); color:var(--gold); }
.sidebar-badge { font-size:11px; padding:2px 8px; border-radius:10px; margin-left:auto; font-family:-apple-system,sans-serif; }
.badge-green { background:rgba(74,222,128,0.15); color:var(--green); }
.badge-gold { background:rgba(212,168,83,0.15); color:var(--gold); }
.badge-gray { background:rgba(107,99,96,0.2); color:var(--text3); }
.content-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; }

/* Chat */
.chat-container { flex:1; display:flex; flex-direction:column; max-width:800px; width:100%; margin:0 auto; }
.chat-messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:16px; }
.chat-msg { display:flex; gap:12px; max-width:90%; animation:fadeIn .3s; }
.chat-msg.ai { align-self:flex-start; }
.chat-msg.user { align-self:flex-end; flex-direction:row-reverse; }
.chat-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; font-family:-apple-system,sans-serif; }
.chat-msg.ai .chat-avatar { background:var(--gold); color:var(--bg); }
.chat-msg.user .chat-avatar { background:var(--surface2); color:var(--text); }
.chat-bubble { padding:14px 18px; border-radius:16px; line-height:1.7; font-size:15px; }
.chat-msg.ai .chat-bubble { background:var(--surface); border:1px solid var(--border); border-top-left-radius:4px; }
.chat-msg.user .chat-bubble { background:var(--card); border:1px solid var(--border); border-top-right-radius:4px; color:var(--text); }
.chat-bubble h1,.chat-bubble h2,.chat-bubble h3 { color:var(--gold); margin:12px 0 8px; }
.chat-bubble h1 { font-size:18px; }
.chat-bubble h2 { font-size:16px; }
.chat-bubble h3 { font-size:15px; }
.chat-bubble ul,.chat-bubble ol { padding-left:20px; margin:8px 0; }
.chat-bubble li { margin:4px 0; }
.chat-bubble strong { color:var(--gold-light); }
.chat-bubble code { background:var(--bg); padding:2px 6px; border-radius:4px; font-size:13px; }
.chat-bubble p { margin:8px 0; }
.chat-input-area { padding:16px 24px; border-top:1px solid var(--border); background:var(--surface); }
.chat-input-wrap { display:flex; gap:12px; align-items:flex-end; }
.chat-input-wrap textarea { min-height:48px; max-height:150px; resize:none; }

/* Center screens */
.center-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:40px; overflow-y:auto; }
.center-box { max-width:560px; width:100%; text-align:center; }
.center-box h1 { font-size:36px; color:var(--gold); margin-bottom:8px; }
.center-box h2 { font-size:24px; color:var(--gold); margin-bottom:8px; }
.center-box p { color:var(--text2); font-size:16px; line-height:1.7; margin-bottom:24px; }
.center-box .subtitle { font-size:18px; color:var(--text2); margin-bottom:32px; }

/* Project list */
.project-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; margin-top:24px; text-align:left; }
.project-card { cursor:pointer; transition:all .2s; position:relative; }
.project-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--gold-dark); }
.project-card h3 { color:var(--text); font-size:16px; margin-bottom:8px; }
.project-card .meta { font-size:12px; color:var(--text3); font-family:-apple-system,sans-serif; }
.project-delete { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text3); cursor:pointer; font-size:16px; opacity:0; transition:opacity .2s; }
.project-card:hover .project-delete { opacity:1; }
.project-delete:hover { color:var(--red); }

/* Document confirm */
.doc-confirm { background:var(--card); border:2px solid var(--gold-dark); border-radius:var(--radius); padding:24px; margin:16px 24px; }
.doc-confirm h3 { color:var(--gold); margin-bottom:16px; }
.doc-content { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:20px; max-height:60vh; overflow-y:auto; line-height:1.8; margin-bottom:16px; }
.doc-actions { display:flex; gap:12px; justify-content:flex-end; }

/* Writing editor */
.editor-container { display:flex; flex:1; overflow:hidden; }
.editor-main { flex:1; display:flex; flex-direction:column; padding:24px; overflow-y:auto; }
.editor-panel { width:340px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.editor-textarea { flex:1; min-height:400px; font-size:16px; line-height:2; padding:20px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); resize:none; }
.editor-toolbar { display:flex; align-items:center; justify-content:space-between; padding:12px 0; font-family:-apple-system,sans-serif; }
.word-count { font-size:13px; color:var(--text3); font-family:-apple-system,sans-serif; }
.word-target { color:var(--gold); }

/* Reading view */
.reading-view { max-width:700px; margin:0 auto; padding:40px 24px; line-height:2; font-size:17px; }
.reading-view h1 { font-size:28px; color:var(--gold); margin-bottom:24px; text-align:center; }

/* Notebook panel */
.notebook { display:flex; flex-direction:column; height:100%; }
.notebook-header { padding:16px; border-bottom:1px solid var(--border); }
.notebook-header h3 { font-size:14px; color:var(--gold); font-family:-apple-system,sans-serif; }
.notebook-notes { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
.notebook-note { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; font-size:13px; position:relative; }
.notebook-note .delete-note { position:absolute; top:4px; right:8px; background:none; border:none; color:var(--text3); cursor:pointer; font-size:12px; }
.notebook-input { padding:12px; border-top:1px solid var(--border); }
.notebook-input textarea { min-height:60px; font-size:13px; }

/* Diff/Review */
.review-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; }
.review-reason { padding:12px 16px; background:var(--card); border-bottom:1px solid var(--border); font-size:13px; color:var(--text2); font-family:-apple-system,sans-serif; }
.review-diff { display:grid; grid-template-columns:1fr 1fr; }
.review-old, .review-new { padding:16px; font-size:14px; line-height:1.7; }
.review-old { background:rgba(248,113,113,0.05); border-right:1px solid var(--border); }
.review-new { background:rgba(74,222,128,0.05); }
.review-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-family:-apple-system,sans-serif; }
.review-old .review-label { color:var(--red); }
.review-new .review-label { color:var(--green); }
.review-actions { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }

/* Progress bar */
.progress-bar { height:6px; background:var(--bg); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--gold); border-radius:3px; transition:width .5s; }

/* Dashboard stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { text-align:center; }
.stat-card .stat-num { font-size:32px; color:var(--gold); font-weight:700; }
.stat-card .stat-label { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; font-family:-apple-system,sans-serif; }

/* Glossary */
.glossary-item { display:flex; align-items:flex-start; gap:16px; padding:16px; border-bottom:1px solid var(--border); }
.glossary-term { font-weight:700; color:var(--gold); min-width:140px; font-size:16px; }
.glossary-def { color:var(--text2); line-height:1.6; flex:1; }
.glossary-actions { display:flex; gap:8px; flex-shrink:0; }

/* Images */
.image-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
.image-card { position:relative; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); cursor:pointer; aspect-ratio:4/3; }
.image-card img { width:100%; height:100%; object-fit:cover; }
.image-card .caption { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.7); padding:8px; font-size:12px; color:var(--text); }
.image-upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:40px; text-align:center; cursor:pointer; transition:all .2s; }
.image-upload-zone:hover { border-color:var(--gold); background:rgba(212,168,83,0.05); }

/* Modal */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; }
#modal-overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px; max-width:500px; width:90%; box-shadow:var(--shadow); }
.modal h2 { color:var(--gold); margin-bottom:12px; font-size:20px; }
.modal p { color:var(--text2); margin-bottom:20px; line-height:1.6; }
.modal-actions { display:flex; gap:12px; justify-content:flex-end; }

/* Loading */
.typing-indicator { display:flex; gap:4px; padding:8px 0; }
.typing-dot { width:8px; height:8px; background:var(--gold); border-radius:50%; animation:bounce 1.4s infinite; }
.typing-dot:nth-child(2) { animation-delay:.2s; }
.typing-dot:nth-child(3) { animation-delay:.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Responsive */
@media(max-width:768px) {
  .sidebar { width:200px; }
  .editor-panel { width:280px; }
  .review-diff { grid-template-columns:1fr; }
  .center-box h1 { font-size:28px; }
}
@media(max-width:600px) {
  .sidebar { display:none; }
  .editor-panel { width:100%; }
  .editor-container { flex-direction:column; }
}

/* Drag and drop */
.dragging { opacity:0.5; }
.drag-over { border-color:var(--gold) !important; background:rgba(212,168,83,0.05) !important; }

/* Tabs */
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); padding:0 16px; }
.tab { padding:10px 16px; font-size:13px; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; font-family:-apple-system,sans-serif; transition:all .2s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* Tooltip */
.tooltip { position:relative; }
.tooltip::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:var(--card); color:var(--text); padding:8px 12px; border-radius:6px; font-size:12px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .2s; border:1px solid var(--border); font-family:-apple-system,sans-serif; }
.tooltip:hover::after { opacity:1; }

/* Read-back mode */
.readback-overlay { position:fixed; inset:0; background:var(--bg); z-index:500; overflow-y:auto; }
.readback-content { max-width:650px; margin:0 auto; padding:60px 24px; line-height:2.2; font-size:18px; }
.readback-close { position:fixed; top:20px; right:24px; z-index:501; }

/* Interactive brainstorm */
.bs-container { flex:1; overflow-y:auto; display:flex; flex-direction:column; max-width:700px; width:100%; margin:0 auto; padding:24px; }
.bs-step { animation:fadeIn .4s; margin-bottom:24px; }
.bs-question { font-size:20px; color:var(--gold); margin-bottom:6px; line-height:1.5; }
.bs-subtitle { font-size:14px; color:var(--text3); margin-bottom:16px; font-family:-apple-system,sans-serif; }
.bs-options { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.bs-option { display:flex; align-items:center; gap:14px; padding:16px 20px; background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:all .2s; font-size:15px; }
.bs-option:hover { border-color:var(--gold-dark); background:var(--surface2); transform:translateX(4px); }
.bs-option.selected { border-color:var(--gold); background:rgba(212,168,83,0.1); }
.bs-option-icon { width:36px; height:36px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.bs-option.selected .bs-option-icon { background:var(--gold); }
.bs-option-text { flex:1; }
.bs-option-label { font-weight:600; color:var(--text); }
.bs-option-desc { font-size:13px; color:var(--text3); margin-top:2px; font-family:-apple-system,sans-serif; }
.bs-or { text-align:center; color:var(--text3); font-size:13px; padding:8px 0; font-family:-apple-system,sans-serif; }
.bs-custom { display:flex; gap:10px; }
.bs-custom textarea { flex:1; min-height:44px; font-size:14px; }
.bs-answer { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; }
.bs-answer-label { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; font-family:-apple-system,sans-serif; min-width:80px; }
.bs-answer-text { color:var(--gold-light); font-size:15px; }
.bs-progress { display:flex; gap:6px; margin-bottom:24px; }
.bs-dot { width:10px; height:10px; border-radius:50%; background:var(--border); transition:all .3s; }
.bs-dot.done { background:var(--gold); }
.bs-dot.active { background:var(--gold); box-shadow:0 0 8px rgba(212,168,83,0.5); transform:scale(1.3); }
.bs-generating { text-align:center; padding:40px; }
.bs-generating p { color:var(--text2); margin-top:12px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-overlay"></div>
<script>
// ============================================================
// CONFIG
// ============================================================
const MODELS = {
  'claude-sonnet-4-5-20250514': { label: 'Claude Sonnet 4.5', desc: 'Fast & affordable — great for brainstorming' },
  'claude-opus-4-0-20250115': { label: 'Claude Opus 4', desc: 'Most capable — best for writing chapters' }
};
const DEFAULT_MODEL = 'claude-sonnet-4-5-20250514';

const CONFIG = {
  apiUrl: 'https://api.anthropic.com/v1/messages',
  get model() { return loadData()?.settings?.model || DEFAULT_MODEL; },
  apiVersion: '2023-06-01',
  maxTokensChat: 4096,
  maxTokensDoc: 8192,
  maxTokensChapter: 16384,
  storageKey: 'bookwizard_data',
  maxImageWidth: 1000,
  imageQuality: 0.7
};

// ============================================================
// STATE
// ============================================================
let state = loadState();
let streamAbort = null;

function defaultState() {
  return { apiKey: '', projects: [], currentProjectId: null, onboarded: false };
}

function loadState() {
  try {
    const raw = localStorage.getItem(CONFIG.storageKey);
    return raw ? { ...defaultState(), ...JSON.parse(raw) } : defaultState();
  } catch { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem(CONFIG.storageKey, JSON.stringify(state)); } catch(e) { console.error('Save failed:', e); }
}

function getProject() {
  return state.projects.find(p => p.id === state.currentProjectId) || null;
}

function saveProject() { saveState(); }

function newProject(name) {
  const p = {
    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2),
    name: name,
    createdAt: new Date().toISOString(),
    currentPhase: 1,
    brainstorm: { messages: [], document: '' },
    research: { messages: [], document: '' },
    plan: { messages: [], document: '', chapters: [] },
    chapters: [],
    continuityLedger: '',
    voiceProfile: '',
    glossary: [],
    settings: { totalWordTarget: 0 }
  };
  state.projects.push(p);
  state.currentProjectId = p.id;
  saveState();
  return p;
}

// ============================================================
// API LAYER
// ============================================================
async function callClaude(messages, systemPrompt, maxTokens, onChunk) {
  if (!state.apiKey) throw new Error('No API key set');
  streamAbort = new AbortController();
  const isStreaming = !!onChunk;

  const body = {
    model: CONFIG.model,
    max_tokens: maxTokens || CONFIG.maxTokensChat,
    system: systemPrompt || '',
    messages: messages,
    stream: isStreaming
  };

  const resp = await fetch(CONFIG.apiUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': CONFIG.apiVersion,
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body),
    signal: streamAbort.signal
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }

  if (!isStreaming) {
    const data = await resp.json();
    return data.content?.[0]?.text || '';
  }

  // Streaming
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '', fullText = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') continue;
      try {
        const d = JSON.parse(raw);
        if (d.type === 'content_block_delta' && d.delta?.text) {
          fullText += d.delta.text;
          onChunk(d.delta.text, fullText);
        }
        if (d.type === 'error') throw new Error(d.error?.message || 'Stream error');
      } catch(e) {
        if (e.message === 'Stream error') throw e;
      }
    }
  }
  return fullText;
}

function abortStream() { if (streamAbort) streamAbort.abort(); streamAbort = null; }

// ============================================================
// MARKDOWN PARSER
// ============================================================
function md(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, m => '<ul>' + m + '</ul>');
  html = html.replace(/<\/ul><br><ul>/g, '');
  return '<p>' + html + '</p>';
}

function formatDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
  catch { return ''; }
}

function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ratio = Math.min(CONFIG.maxImageWidth / img.width, 1);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', CONFIG.imageQuality));
    };
    img.src = URL.createObjectURL(file);
  });
}

function autoGrow(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
}

      </div>
      <div class="header-actions ui">
        <button class="btn btn-ghost btn-sm" onclick="navigate('home')">Home</button>
      </div>
    </div>
    <div class="main">
      <div class="content-area">
        <div class="chat-container">
          <div class="chat-messages" id="chat-messages"></div>
          <div id="doc-confirm-area"></div>
          <div class="chat-input-area" id="chat-input-area">
            <div class="chat-input-wrap">
              <textarea id="chat-input" placeholder="Type your message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPhaseMessage(${phase})}" oninput="autoGrow(this)"></textarea>
              <button class="btn btn-gold btn-sm" onclick="sendPhaseMessage(${phase})" id="send-btn">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  const msgArea = document.getElementById('chat-messages');
  // Render existing messages
  if (store.messages.length === 0 && !store.document) {
    const initial = cfg.getInitial(p);
    store.messages.push({ role: 'assistant', content: initial });
    saveProject();
    // If phase 3, auto-generate initial plan by inserting a user prompt
    if (phase === 3) {
      store.messages.push({ role: 'user', content: 'Please create the detailed chapter-by-chapter book plan based on our concept and research.' });
      saveProject();
      renderMessages(store.messages, msgArea);
      setTimeout(() => sendAutoPhaseMessage(phase), 500);
      return;
    }
  }
  renderMessages(store.messages, msgArea);

  // If document already confirmed, show it
  if (store.document) {
    showConfirmedDoc(store.document, phase);
  }
}

function renderBrainstorm(app, p) {
  if (!p.brainstorm.answers) p.brainstorm.answers = {};

  const answers = p.brainstorm.answers;
  const currentQ = p.brainstorm.currentQ;
  const total = BRAINSTORM_QUESTIONS.length;

    renderBrainstormGenerating(app, p);
    return;

  const q = BRAINSTORM_QUESTIONS[currentQ];

  // For the first question (AI-deduced subject), trigger deduction if not done
  const isAiDeduced = q.type === 'ai-deduced';

          <div class="bs-subtitle">Based on your title "<strong>${esc(p.name)}</strong>", here's what I think:</div>

let bsSelectedOptions = [];

function selectBsOption(qIdx, optIdx, el, multi) {
  if (multi) {
    el.classList.toggle('selected');
    if (el.classList.contains('selected')) {
      bsSelectedOptions.push(optIdx);
    } else {
      bsSelectedOptions = bsSelectedOptions.filter(i => i !== optIdx);
    }
  } else {
    document.querySelectorAll('.bs-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    bsSelectedOptions = [optIdx];
  }
}

function bsSubmitAnswer(qIdx) {
  const q = BRAINSTORM_QUESTIONS[qIdx];
  const activeOptions = (tailoredOptions && tailoredOptions[q.id]) ? tailoredOptions[q.id] : q.options;
  const customInput = document.getElementById('bs-custom-input');
  const customText = customInput?.value?.trim();

  let answer = '';
  if (customText) {
    answer = customText;
  } else if (bsSelectedOptions.length > 0 && activeOptions) {
    if (q.multi) {
      answer = bsSelectedOptions.map(i => activeOptions[i].label).join(', ');
    } else {
      answer = activeOptions[bsSelectedOptions[0]].label;
    }
  }

  if (!answer) {
    // Shake the input to indicate they need to answer
    const btn = document.getElementById('bs-next-btn');
    if (btn) { btn.style.animation = 'none'; btn.offsetHeight; btn.style.animation = ''; }
    if (customInput) customInput.focus();
    return;
  }

  const p = getProject();
  if (!p.brainstorm.answers) p.brainstorm.answers = {};
  p.brainstorm.answers[q.id] = answer;
  p.brainstorm.currentQ = qIdx + 1;
  bsSelectedOptions = [];
  saveProject();

  // If subject was just answered, generate tailored options for remaining questions
  if (q.id === 'subject' && !tailoredOptions && !tailoredLoading) {
    generateTailoredOptions(answer, p.name);
  }

  // If all questions done, generate concept
  if (qIdx + 1 >= BRAINSTORM_QUESTIONS.length) {
    renderBrainstorm(document.getElementById('app'), p);
    generateBrainstormConcept(p);
  } else {
    navigate('phase', { phase: 1 });
  }
}

function bsPrevQuestion() {
  const p = getProject();
  if (p.brainstorm.currentQ > 0) {
    p.brainstorm.currentQ--;
    // Remove the answer for the current question so they can re-answer
    const q = BRAINSTORM_QUESTIONS[p.brainstorm.currentQ];
    delete p.brainstorm.answers[q.id];
    bsSelectedOptions = [];
    // If going back to subject question, reset deduction state
    if (q.type === 'ai-deduced') {
      subjectDeduction = { loading: false, result: null, error: null };
    }
    saveProject();
    navigate('phase', { phase: 1 });
  }
}

function confirmDeducedSubject(choice, el) {
  if (choice === true) {
    // User confirmed — use the AI's deduction as the answer
    const p = getProject();
    if (!p.brainstorm.answers) p.brainstorm.answers = {};
    p.brainstorm.answers['subject'] = subjectDeduction.result;
    p.brainstorm.currentQ = 1;
    bsSelectedOptions = [];
    saveProject();
    // Generate tailored options based on confirmed subject
    generateTailoredOptions(subjectDeduction.result, p.name);
    navigate('phase', { phase: 1 });
  } else if (choice === false || choice === 'different') {
    // Show the refine area with pre-filled text (or empty for 'different')
    document.querySelectorAll('.bs-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    const refineArea = document.getElementById('bs-refine-area');
    const textarea = document.getElementById('bs-custom-input');
    if (refineArea) {
      refineArea.style.display = 'block';
      if (textarea) {
        textarea.value = choice === false ? subjectDeduction.result : '';
        textarea.focus();
        autoGrow(textarea);
      }
    }
  }
}

async function generateBrainstormConcept(p) {
  const answers = p.brainstorm.answers;
  const answersText = Object.entries(answers).map(([key, val]) => {
    const qDef = BRAINSTORM_QUESTIONS.find(q => q.id === key);
    return `${qDef ? qDef.question : key}: ${Array.isArray(val) ? val.join(', ') : val}`;
  }).join('\n');

  const system = `You are an experienced book editor. The author is a first-time writer, expert in their subject but not in book writing.

Book working title: "${p.name}"

Author's answers:
${answersText}

Return ONLY a valid JSON object (no markdown, no code fences, no extra text) with this exact structure:
{
  "title": "Suggested book title",
  "about": "1-2 sentence description of what this book is about",
  "audience": "1 sentence describing the target reader",
  "angle": "1 sentence about the author's unique perspective",
  "tone": "Short description of recommended tone, e.g. Conversational and warm — like a knowledgeable friend sharing over drinks",
  "chapters": 14,
  "words": "~60,000",
  "pillars": ["Pillar 1 name — one line desc", "Pillar 2 name — one line desc", "Pillar 3 name — one line desc", "Pillar 4 name — one line desc", "Pillar 5 name — one line desc"],
  "features": ["Feature 1", "Feature 2", "Feature 3"]
}

Be concise. Each value should be 1-2 sentences max. Return ONLY the JSON.`;

  try {
    let fullText = '';
    const resultArea = document.getElementById('bs-concept-result');
    const genArea = document.getElementById('bs-generating');

    await callClaude([{ role: 'user', content: 'Generate the book concept JSON.' }], system, CONFIG.maxTokensDoc, (chunk, full) => {
      fullText = full;
    });

    if (genArea) genArea.style.display = 'none';

    // Parse JSON from response
    let concept;
    try {
      const jsonStr = fullText.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
      concept = JSON.parse(jsonStr);
    } catch(e2) {
      throw new Error('AI returned invalid format. Please try again.');
    }

    // Store concept data
    p.brainstorm.concept = concept;

    // Build the markdown document for downstream phases
    const docText = `**Title:** ${concept.title}\n**About:** ${concept.about}\n**Audience:** ${concept.audience}\n**Angle:** ${concept.angle}\n**Tone:** ${concept.tone}\n**Scope:** ${concept.words} across ${concept.chapters} chapters\n**Content Pillars:**\n${concept.pillars.map((p,i) => `${i+1}. ${p}`).join('\n')}\n**Features:** ${concept.features.join(', ')}`;
    p.brainstorm.document = docText;
    p.brainstorm.messages = [
      { role: 'user', content: 'Brainstorming answers:\n' + answersText },
      { role: 'assistant', content: docText }
    ];
    saveProject();

    // Render interactive cards
    renderConceptCards(resultArea, concept);

  } catch(e) {
    console.error('Brainstorm generation error:', e);
    const genArea = document.getElementById('bs-generating');
    const resultArea = document.getElementById('bs-concept-result');
    if (genArea) genArea.style.display = 'none';
    if (resultArea) {
      resultArea.innerHTML = `
        <div class="card" style="border-color:var(--red);margin-top:16px;">
          <p style="color:var(--red);margin-bottom:12px;">Something went wrong: ${esc(e.message)}</p>
          <button class="btn btn-gold" onclick="generateBrainstormConcept(getProject())">Try Again</button>
        </div>
      `;
    }
  }
}

function editConceptField(key) {
  const p = getProject();
  const concept = p.brainstorm.concept;
  if (!concept) return;

  const FIELD_OPTIONS = {
    tone: [
      { label: 'Casual & Conversational', desc: 'Like chatting with a friend over drinks' },
      { label: 'Educational & Clear', desc: 'Structured, informative, easy to follow' },
      { label: 'Storytelling & Narrative', desc: 'Rich prose with stories and vivid descriptions' },
      { label: 'Authoritative & Professional', desc: 'Serious, expert-level, reference quality' }
    ],
    audience: [
      { label: 'Complete beginners curious about the subject', desc: '' },
      { label: 'Enthusiasts who want to deepen their knowledge', desc: '' },
      { label: 'Both beginners and enthusiasts', desc: '' },
      { label: 'Professionals and industry insiders', desc: '' }
    ]
  };

  const currentVal = key === 'scope' ? `${concept.words} across ${concept.chapters} chapters` :
    (Array.isArray(concept[key]) ? concept[key].join('\n') : concept[key]);
  const options = FIELD_OPTIONS[key];

  const labels = { title: 'Book Title', about: 'What It\'s About', audience: 'Target Reader', angle: 'Your Unique Angle', tone: 'Writing Tone', scope: 'Book Size', pillars: 'Content Pillars', features: 'Special Features' };

  let modalBody = `<div style="margin-bottom:12px;color:var(--muted);font-size:14px;">Current: <strong style="color:var(--text);">${esc(Array.isArray(concept[key]) ? concept[key].join(', ') : currentVal)}</strong></div>`;

  if (options) {
    modalBody += options.map((opt, i) => `
      <div class="bs-option" onclick="applyConceptOption('${key}', '${opt.label.replace(/'/g, "\\'")}', this)" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;cursor:pointer;">
        <div style="font-weight:600;">${opt.label}</div>
        ${opt.desc ? `<div style="color:var(--muted);font-size:13px;">${opt.desc}</div>` : ''}
      </div>
    `).join('');
    modalBody += `<div class="bs-or" style="margin:12px 0;">— or type your own —</div>`;
  }

  modalBody += `<textarea id="concept-edit-input" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:inherit;font-size:14px;resize:vertical;min-height:${key === 'pillars' || key === 'features' ? '120px' : '60px'};" placeholder="Type your own...">${esc(currentVal)}</textarea>`;

  showModal(`Edit: ${labels[key] || key}`, modalBody, [
    { label: 'Cancel', cls: 'btn-ghost' },
    { label: 'Save', cls: 'btn-gold', fn: () => {
      const input = document.getElementById('concept-edit-input');
      const newVal = input?.value?.trim();
      if (!newVal) return;
      if (key === 'scope') {
        const numMatch = newVal.match(/(\d+)/);
        if (numMatch) concept.chapters = parseInt(numMatch[0]);
        concept.words = newVal.replace(/across.*$/i, '').trim();
      } else if (key === 'pillars' || key === 'features') {
        concept[key] = newVal.split('\n').filter(l => l.trim());
      } else {
        concept[key] = newVal;
      }
      // Rebuild document
      const docText = `**Title:** ${concept.title}\n**About:** ${concept.about}\n**Audience:** ${concept.audience}\n**Angle:** ${concept.angle}\n**Tone:** ${concept.tone}\n**Scope:** ${concept.words} across ${concept.chapters} chapters\n**Content Pillars:**\n${concept.pillars.map((p,i) => `${i+1}. ${p}`).join('\n')}\n**Features:** ${concept.features.join(', ')}`;
      p.brainstorm.document = docText;
      saveProject();
      const resultArea = document.getElementById('bs-concept-result');
      if (resultArea) renderConceptCards(resultArea, concept);
    }}
  ]);
}

function applyConceptOption(key, value, el) {
  const input = document.getElementById('concept-edit-input');
  if (input) input.value = value;
  document.querySelectorAll('.bs-option').forEach(o => o.style.borderColor = 'var(--border)');
  el.style.borderColor = 'var(--gold)';
}

function bsConfirmConcept() {
  const p = getProject();
  if (!p.brainstorm.document) return;
  p.currentPhase = 2;
  saveProject();
  navigate('phase', { phase: 2 });
}

let researchLoading = false;

function renderResearchPhase(app, p) {

        </div>
      </div>

  if (!researchLoading) generateResearchStructure(p);
}

async function generateResearchStructure(p) {
  researchLoading = true;
  const concept = p.brainstorm.document;

  const system = `You are a senior book editor and publishing consultant. You are the EXPERT — the author trusts you to make all structural decisions.

Book: "${p.name}"
Concept: ${concept}

Based on your expertise, determine the optimal structure for this book. Make decisive recommendations — don't ask the author, TELL them what works best.

Return ONLY valid JSON (no markdown fences):
{
  "genre": "The specific genre/category (e.g. 'Non-fiction / Spirits & Beverages Guide')",
  "comparable_books": ["Book Title 1 by Author — why it's relevant", "Book Title 2 by Author — why", "Book Title 3 by Author — why"],
  "total_words": "~65,000",
  "total_words_reasoning": "1-2 sentence explanation of why this length is ideal",
  "chapter_count": 14,
  "chapter_count_reasoning": "1-2 sentence explanation",
  "words_per_chapter": "4,000-5,000",
  "structure_type": "The recommended structure approach (e.g. 'Thematic with progressive complexity')",
  "structure_reasoning": "1-2 sentences on why this structure works",
  "key_topics": ["Topic 1", "Topic 2", "Topic 3", "Topic 4", "Topic 5", "Topic 6", "Topic 7", "Topic 8"],
  "front_matter": ["Introduction", "How to Use This Book"],
  "back_matter": ["Glossary", "Resources", "Index"],
  "special_elements": ["Element 1 — brief desc", "Element 2 — brief desc", "Element 3 — brief desc"],
  "target_timeline": "Estimated writing timeline (e.g. '4-6 months at 1 chapter per week')"
}

Be specific to this exact book subject. Base your decisions on real publishing standards for this genre.`;

  try {
    let fullText = '';
    await callClaude([{ role: 'user', content: 'Generate the research and structure JSON.' }], system, CONFIG.maxTokensDoc, (chunk, full) => {
      fullText = full;
    });

    const jsonStr = fullText.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    researchData = JSON.parse(jsonStr);

    p.research.researchData = researchData;
    saveProject();

    researchLoading = false;
    const genArea = document.getElementById('research-generating');
    if (genArea) genArea.style.display = 'none';

    renderResearchCards(document.getElementById('app'), p);

  } catch(e) {
    console.error('Research generation error:', e);
    researchLoading = false;
    const genArea = document.getElementById('research-generating');
    const resultArea = document.getElementById('research-result');
    if (genArea) genArea.style.display = 'none';
    if (resultArea) {
      resultArea.innerHTML = `
        <div class="card" style="border-color:var(--red);margin-top:16px;">
          <p style="color:var(--red);margin-bottom:12px;">Something went wrong: ${esc(e.message)}</p>
          <button class="btn btn-gold" onclick="researchLoading=false;generateResearchStructure(getProject())">Try Again</button>
        </div>`;
    }
  }
}

function renderResearchCards(app, p) {

  if (!rd) { renderResearchPhase(app, p); return; }

  const RESEARCH_FIELDS = [
    { key: 'genre', icon: '📂', label: 'Genre & Category' },
    { key: 'comparable_books', icon: '📚', label: 'Comparable Books', isList: true },
    { key: 'structure_type', icon: '🏗️', label: 'Book Structure', hasReason: 'structure_reasoning' },
    { key: 'chapter_count', icon: '📑', label: 'Number of Chapters', hasReason: 'chapter_count_reasoning', suffix: ' chapters' },
    { key: 'total_words', icon: '📏', label: 'Total Word Count', hasReason: 'total_words_reasoning' },
    { key: 'words_per_chapter', icon: '✏️', label: 'Words Per Chapter', suffix: ' words per chapter' },
    { key: 'key_topics', icon: '🎯', label: 'Key Topics to Cover', isList: true },
    { key: 'front_matter', icon: '📖', label: 'Front Matter', isList: true },
    { key: 'back_matter', icon: '📋', label: 'Back Matter', isList: true },
    { key: 'special_elements', icon: '✨', label: 'Special Elements', isList: true },
    { key: 'target_timeline', icon: '📅', label: 'Suggested Timeline' }
  ];

  app.innerHTML = `
    ${phaseHeader(2)}
    <div class="main">
      <div class="content-area">
        <div class="bs-container" style="max-width:700px;margin:0 auto;">
          <h2 style="color:var(--gold);margin-bottom:4px;">📚 Your Book Structure</h2>
          <p class="ui" style="color:var(--muted);margin-bottom:20px;font-size:14px;">Based on my analysis of your genre and concept, here's what I recommend. Tap any card to adjust.</p>

          ${RESEARCH_FIELDS.map(f => {
            const val = rd[f.key];
            const reason = f.hasReason ? rd[f.hasReason] : null;
            let displayVal;
            if (f.isList && Array.isArray(val)) {
              displayVal = val.map(v => `<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);">• ${esc(v)}</div>`).join('');
            } else {
              displayVal = esc(String(val)) + (f.suffix || '');
            }
            return `
              <div class="concept-card" onclick="editResearchField('${f.key}')" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;">
                <div style="display:flex;align-items:flex-start;gap:12px;">
                  <span style="font-size:20px;flex-shrink:0;margin-top:2px;">${f.icon}</span>
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:4px;">${f.label}</div>
                    <div style="color:var(--text);font-size:15px;line-height:1.5;">${displayVal}</div>
                    ${reason ? `<div style="color:var(--muted);font-size:12px;margin-top:6px;font-style:italic;">💡 ${esc(reason)}</div>` : ''}
                  </div>
                  <span style="color:var(--muted);font-size:14px;flex-shrink:0;margin-top:2px;">&#9998;</span>
                </div>
              </div>`;
          }).join('')}

          <div style="display:flex;gap:12px;margin-top:20px;justify-content:space-between;">
            <button class="btn btn-ghost" onclick="researchLoading=false;researchData=null;const pp=getProject();pp.research={messages:[],document:'',researchData:null};saveProject();navigate('phase',{phase:2})">Regenerate</button>
            <button class="btn btn-gold" onclick="confirmResearch()">Approve & Continue to Plan</button>
          </div>
        </div>
      </div>
    </div>`;
}

function editResearchField(key) {
  const p = getProject();
  const rd = researchData || p.research.researchData;
  if (!rd) return;

  const labels = { genre:'Genre', comparable_books:'Comparable Books', structure_type:'Structure', chapter_count:'Chapters', total_words:'Word Count', words_per_chapter:'Words/Chapter', key_topics:'Key Topics', front_matter:'Front Matter', back_matter:'Back Matter', special_elements:'Special Elements', target_timeline:'Timeline' };
  const currentVal = Array.isArray(rd[key]) ? rd[key].join('\n') : String(rd[key]);

  let modalBody = `<div style="margin-bottom:12px;color:var(--muted);font-size:14px;">Current value shown below. Edit or type a new one:</div>`;
  modalBody += `<textarea id="research-edit-input" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:inherit;font-size:14px;resize:vertical;min-height:${Array.isArray(rd[key]) ? '120px' : '60px'};">${esc(currentVal)}</textarea>`;

  showModal(`Edit: ${labels[key] || key}`, modalBody, [
    { label: 'Cancel', cls: 'btn-ghost' },
    { label: 'Save', cls: 'btn-gold', fn: () => {
      const input = document.getElementById('research-edit-input');
      const newVal = input?.value?.trim();
      if (!newVal) return;
      if (Array.isArray(rd[key])) {
        rd[key] = newVal.split('\n').filter(l => l.trim());
      } else if (key === 'chapter_count') {
        rd[key] = parseInt(newVal) || rd[key];
      } else {
        rd[key] = newVal;
      }
      p.research.researchData = rd;
      researchData = rd;
      saveProject();
      renderResearchCards(document.getElementById('app'), p);
    }}
  ]);
}

function confirmResearch() {
  const p = getProject();
  const rd = researchData || p.research.researchData;
  // Build document text for downstream phases
  const docText = `**Genre:** ${rd.genre}
**Structure:** ${rd.structure_type} — ${rd.structure_reasoning || ''}
**Chapters:** ${rd.chapter_count} chapters, ${rd.words_per_chapter} words each
**Total Words:** ${rd.total_words} — ${rd.total_words_reasoning || ''}
**Key Topics:** ${rd.key_topics.join(', ')}
**Front Matter:** ${rd.front_matter.join(', ')}
**Back Matter:** ${rd.back_matter.join(', ')}
**Special Elements:** ${(rd.special_elements||[]).join(', ')}
**Timeline:** ${rd.target_timeline}
**Comparable Books:** ${rd.comparable_books.join('; ')}`;

  p.research.document = docText;
  p.research.messages = [{ role: 'assistant', content: docText }];
  p.currentPhase = 3;
  saveProject();
  navigate('phase', { phase: 3 });
}

async function generateBookPlan(p) {
  planLoading = true;
  const rd = p.research.researchData || {};

  const system = `You are a senior book editor creating a chapter-by-chapter plan. You are the EXPERT.

Book: "${p.name}"
Concept: ${p.brainstorm.document}
Structure: ${p.research.document}

Create exactly ${rd.chapter_count || 14} chapters. Return ONLY valid JSON (no markdown fences):
{
  "front_matter": [
    {"title": "Foreword", "description": "1 sentence about what this section covers"},
    {"title": "Introduction", "description": "1 sentence"}
  ],
  "chapters": [
    {
      "number": 1,
      "title": "Chapter title",
      "synopsis": "2-3 sentences describing what this chapter covers and why it matters",
      "key_points": ["Point 1", "Point 2", "Point 3"],
      "wordTarget": 5000
    }
  ],
  "back_matter": [
    {"title": "Glossary", "description": "1 sentence"}
  ]
}

Make every chapter title compelling and specific to this book's subject. Synopsis should be detailed enough that a writer could write the chapter from it. Key points should be concrete subtopics. Word targets should match the research recommendations.`;

          <button class="btn btn-gold" onclick="planLoading=false;generateBookPlan(getProject())">Try Again</button>

    }

            <div style="margin-bottom:16px;">
              <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:8px;">Front Matter</div>

          <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:8px;">Chapters</div>

          ${pd.chapters.map((ch, i) => `

              <div style="display:flex;align-items:flex-start;gap:12px;">
                <div style="background:var(--gold);color:var(--bg);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;">${ch.number || i + 1}</div>

                  <div style="color:var(--muted);font-size:12px;margin-top:6px;">~${(ch.wordTarget || 5000).toLocaleString()} words</div>

          ${(pd.back_matter || []).length > 0 ? `

              ${pd.back_matter.map(bm => `

            <button class="btn btn-gold" onclick="confirmPlan()">Approve & Start Writing</button>
          </div>
        </div>
      </div>
    </div>`;
}

function editPlanChapter(idx) {
  const p = getProject();

function confirmPlan() {
  const p = getProject();
  const pd = planData || p.plan.planData;
  if (!pd) return;

  // Build document
  let docText = `# Book Plan: ${p.name}\n\n`;
  if (pd.front_matter?.length) {
    docText += `## Front Matter\n${pd.front_matter.map(f => `- **${f.title}:** ${f.description}`).join('\n')}\n\n`;
  }
  docText += `## Chapters\n\n`;
  pd.chapters.forEach(ch => {
    docText += `### Chapter ${ch.number}: ${ch.title}\n${ch.synopsis}\n**Key Points:** ${(ch.key_points||[]).join(', ')}\n**Word Target:** ~${(ch.wordTarget||5000).toLocaleString()}\n\n`;
  });
  if (pd.back_matter?.length) {
    docText += `## Back Matter\n${pd.back_matter.map(b => `- **${b.title}:** ${b.description}`).join('\n')}\n`;
  }

  p.plan.document = docText;
  p.plan.chapters = pd.chapters;
  p.plan.planData = pd;

  // Create writing chapters
  p.chapters = pd.chapters.map(c => ({
    number: c.number, title: c.title, synopsis: c.synopsis,
    wordTarget: c.wordTarget || 5000, status: 'not-started', writingMode: null,
    content: '', notes: [], versions: [], images: [], summary: '',
    key_points: c.key_points || []
  }));
  p.settings.totalWordTarget = p.chapters.reduce((s,c) => s + c.wordTarget, 0);
  p.currentPhase = 4;
  saveProject();
  navigate('project');
}

function renderMessages(messages, container) {
  container.innerHTML = messages.map(m => `
    <div class="chat-msg ${m.role === 'assistant' ? 'ai' : 'user'}">
      <div class="chat-avatar">${m.role === 'assistant' ? 'AI' : 'You'}</div>
      <div class="chat-bubble">${md(cleanDocTags(m.content))}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

function cleanDocTags(text) {
  return text.replace(/<DOCUMENT>[\s\S]*?<\/DOCUMENT>/g, '[Document generated - see below]')
             .replace(/<CHAPTERS>[\s\S]*?<\/CHAPTERS>/g, '');
}

async function sendPhaseMessage(phase) {
  if (chatStreaming) return;
  const input = document.getElementById('chat-input');
  const text = input?.value?.trim();
  if (!text) return;
  input.value = '';
  autoGrow(input);

  const p = getProject();
  const cfg = PHASE_CONFIG[phase];
  const store = p[cfg.storeKey];

  store.messages.push({ role: 'user', content: text });
  saveProject();

  await streamPhaseResponse(phase);
}

async function sendAutoPhaseMessage(phase) {
  await streamPhaseResponse(phase);
}

async function streamPhaseResponse(phase) {
  const p = getProject();
  const cfg = PHASE_CONFIG[phase];
  const store = p[cfg.storeKey];
  const msgArea = document.getElementById('chat-messages');
  const sendBtn = document.getElementById('send-btn');

  chatStreaming = true;
  if (sendBtn) sendBtn.disabled = true;

  // Add placeholder
  const aiMsg = { role: 'assistant', content: '' };
  store.messages.push(aiMsg);
  renderMessages(store.messages, msgArea);

  // Show typing
  const lastBubble = msgArea.querySelector('.chat-msg.ai:last-child .chat-bubble');
  if (lastBubble) lastBubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

  try {
    // API requires messages to start with 'user' role — skip leading assistant messages
    const allMsgs = store.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
    const firstUserIdx = allMsgs.findIndex(m => m.role === 'user');
    const apiMessages = firstUserIdx >= 0 ? allMsgs.slice(firstUserIdx) : allMsgs;
    const fullText = await callClaude(apiMessages, cfg.getSystem(p), cfg.maxTokens, (chunk, full) => {
      aiMsg.content = full;
      if (lastBubble) {
        lastBubble.innerHTML = md(cleanDocTags(full));
        msgArea.scrollTop = msgArea.scrollHeight;
      }
    });
    aiMsg.content = fullText;
    saveProject();

    // Check for document
    const docMatch = fullText.match(/<DOCUMENT>([\s\S]*?)<\/DOCUMENT>/);
    if (docMatch) {
      const doc = docMatch[1].trim();
      store.document = doc;

      // Parse chapters for phase 3
      if (phase === 3) {
        const chapMatch = fullText.match(/<CHAPTERS>([\s\S]*?)<\/CHAPTERS>/);
        if (chapMatch) {
          try { store.chapters = JSON.parse(chapMatch[1].trim()); } catch {}
        }
      }
      saveProject();
      showDocConfirmation(doc, phase);
    }
  } catch(e) {
    console.error('Chat API error:', e);
    if (e.name === 'AbortError') {
      // User cancelled - remove the empty AI message
      store.messages.pop();
      saveProject();
    } else {
      // Show error in the AI bubble and keep it visible
      aiMsg.content = `Something went wrong: ${e.message}\n\nPlease check your API key in API Settings and try again.`;
      saveProject();
    }
  }

  chatStreaming = false;
  if (sendBtn) sendBtn.disabled = false;
  renderMessages(store.messages, msgArea);
}

function showDocConfirmation(doc, phase) {
  const area = document.getElementById('doc-confirm-area');
  if (!area) return;
  const nextLabel = phase < 3 ? 'Continue to ' + ['','','Research & Structure','Book Plan'][phase+1] : 'Start Writing Your Book';
  area.innerHTML = `
    <div class="doc-confirm">
      <h3>${['','Book Concept Document','Research & Structure Document','Book Plan'][phase]}</h3>
      <div class="doc-content">${md(doc)}</div>
      <div class="doc-actions">
        <button class="btn btn-ghost" onclick="requestDocChanges(${phase})">I'd like changes</button>
        <button class="btn btn-gold" onclick="confirmPhaseDoc(${phase})">${nextLabel}</button>
      </div>
    </div>
  `;
  area.scrollIntoView({ behavior: 'smooth' });
}

function showConfirmedDoc(doc, phase) {
  const area = document.getElementById('doc-confirm-area');
  if (!area) return;
  const p = getProject();
  const canProceed = phase < p.currentPhase || (phase === 3 && p.chapters.length > 0);
  area.innerHTML = `
    <div class="doc-confirm" style="border-color:var(--green);">
      <h3 style="color:var(--green);">Confirmed: ${['','Book Concept','Research & Structure','Book Plan'][phase]}</h3>
      <div class="doc-content">${md(doc)}</div>
      ${canProceed && phase < 3 ? `<div class="doc-actions"><button class="btn btn-gold" onclick="navigate('phase',{phase:${phase+1}})">Continue to Phase ${phase+1}</button></div>` : ''}
      ${phase === 3 && p.currentPhase >= 4 ? `<div class="doc-actions"><button class="btn btn-gold" onclick="navigate('project')">Go to Writing Studio</button></div>` : ''}
    </div>
  `;
  // Hide input area
  const inputArea = document.getElementById('chat-input-area');
  if (inputArea && (p.currentPhase > phase || (phase === 3 && p.chapters.length > 0))) inputArea.style.display = 'none';
}

function requestDocChanges(phase) {
  const p = getProject();
  const cfg = PHASE_CONFIG[phase];
  const store = p[cfg.storeKey];
  store.document = '';
  if (phase === 3) store.chapters = [];
  saveProject();
  document.getElementById('doc-confirm-area').innerHTML = '';
  document.getElementById('chat-input')?.focus();
}

function confirmPhaseDoc(phase) {
  const p = getProject();
  if (phase < 3) {
    p.currentPhase = phase + 1;
    saveProject();
    navigate('phase', { phase: phase + 1 });
  } else {
    // Phase 3 complete - create chapters and enter project mode
    if (p.plan.chapters.length) {
      p.chapters = p.plan.chapters.map(c => ({
        number: c.number, title: c.title, synopsis: c.synopsis,
        wordTarget: c.wordTarget || 5000, status: 'not-started', writingMode: null,
        content: '', notes: [], versions: [], images: [], summary: ''
      }));
      p.settings.totalWordTarget = p.chapters.reduce((s,c) => s + c.wordTarget, 0);
    }
    p.currentPhase = 4;
    saveProject();
    navigate('project');
  }
}

// Drag & drop chapter reordering
let dragIdx = null;
function dragStart(e, idx) { dragIdx = idx; e.dataTransfer.effectAllowed = 'move'; e.target.classList.add('dragging'); }
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dropChapter(e, targetIdx) {
  e.preventDefault();
  if (dragIdx === null || dragIdx === targetIdx) return;
  const p = getProject();
  const [moved] = p.chapters.splice(dragIdx, 1);
  p.chapters.splice(targetIdx, 0, moved);
  p.chapters.forEach((c,i) => c.number = i + 1);
  saveProject();
  navigate('project');
}

function openChapter(idx) {
  navigate('chapter', { chapterIdx: idx });
}

// ---- PATH B: AI-write ----
async function generateAiChapter(idx) {
  const p = getProject();
  const ch = p.chapters[idx];

  // Build context
  const prevSummaries = p.chapters.filter(c => c.number < ch.number && c.summary).map(c => `Chapter ${c.number} (${c.title}): ${c.summary}`).join('\n\n');

  const system = `You are writing Chapter ${ch.number}: "${ch.title}" of the book "${p.name}".

--- BOOK CONCEPT ---
${p.brainstorm.document}
--- END ---

--- BOOK PLAN (This Chapter) ---
Synopsis: ${ch.synopsis}
Target word count: ${ch.wordTarget} words
--- END ---

${p.continuityLedger ? `--- CONTINUITY LEDGER ---\n${p.continuityLedger}\n--- END ---` : ''}
${p.voiceProfile ? `--- VOICE PROFILE ---\n${p.voiceProfile}\n--- END ---` : ''}
${p.glossary.length ? `--- GLOSSARY ---\n${p.glossary.map(g=>g.term+': '+g.definition).join('\n')}\n--- END ---` : ''}
${prevSummaries ? `--- PREVIOUS CHAPTERS SUMMARIES ---\n${prevSummaries}\n--- END ---` : ''}

Write the complete chapter. Aim for approximately ${ch.wordTarget} words. Match the author's voice if a voice profile exists. Maintain consistency with the continuity ledger and previous chapters. Write engaging, professional prose.`;

  navigate('chapter', { chapterIdx: idx });
  // Wait for render
  await new Promise(r => setTimeout(r, 100));
  renderChapterAiWriteLoading(p, ch, idx);

  try {
    const fullText = await callClaude([{ role:'user', content: `Please write Chapter ${ch.number}: "${ch.title}" now.` }], system, CONFIG.maxTokensChapter,
      (chunk, full) => {
        const reader = document.getElementById('ai-chapter-reader');
        if (reader) {
          reader.innerHTML = md(full);
          const container = document.getElementById('reading-scroll');
          if (container) container.scrollTop = container.scrollHeight;
        }
      });
    ch.content = fullText;
    ch.status = 'draft';
    saveProject();
    navigate('chapter', { chapterIdx: idx });
  } catch(e) {
    if (e.name !== 'AbortError') {
      const reader = document.getElementById('ai-chapter-reader');
      if (reader) reader.innerHTML += `<p style="color:var(--red)">Error: ${esc(e.message)}. <button class="btn btn-gold btn-sm" onclick="generateAiChapter(${idx})">Retry</button></p>`;
    }
  }
}

let reviewSuggestions = [];

async function requestAiReview(idx) {
  const p = getProject();
  const ch = p.chapters[idx];
  if (!ch.content.trim()) return showModal('Nothing to Review', 'Write some content first before requesting an AI review.', [{ label: 'OK', cls: 'btn-gold' }]);

  // Save version before review
  ch.versions.push({ content: ch.content, timestamp: new Date().toISOString(), label: 'Before review' });
  ch.status = 'reviewing';
  saveProject();

  navigate('review', { chapterIdx: idx, source: 'self' });
  await generateReview(idx, []);
}

async function submitNotesForReview(idx) {
  const p = getProject();
  const ch = p.chapters[idx];
  if (!ch.notes.length) return showModal('No Notes', 'Add some notes about what you\'d like to change before submitting for review.', [{ label: 'OK', cls: 'btn-gold' }]);

  ch.versions.push({ content: ch.content, timestamp: new Date().toISOString(), label: 'Before note review' });
  ch.status = 'reviewing';
  saveProject();

  navigate('review', { chapterIdx: idx, source: 'ai' });
  await generateReview(idx, ch.notes);
}

async function generateReview(idx, notes) {
  const p = getProject();
  const ch = p.chapters[idx];
  const loadArea = document.getElementById('review-loading');
  if (loadArea) loadArea.style.display = 'block';

  const notesContext = notes.length ? `\n\nThe author has the following notes/issues to address:\n${notes.map((n,i) => `${i+1}. ${n}`).join('\n')}` : '';

  const system = `You are reviewing Chapter ${ch.number}: "${ch.title}" of "${p.name}".

${p.continuityLedger ? `Continuity Ledger:\n${p.continuityLedger}\n` : ''}
${p.voiceProfile ? `Voice Profile:\n${p.voiceProfile}\n` : ''}
Book Plan for this chapter:\n${ch.synopsis}

Review the chapter for:
- Consistency with the book plan and previous chapters
- Tone and voice consistency
- Writing quality (clarity, flow, engagement)
- Factual accuracy where possible
- Any issues the author noted
${notesContext}

For EACH suggested change, use this exact format:

<SUGGESTION>
<REASON>Why this change is recommended</REASON>
<OLD>The exact original text passage</OLD>
<NEW>The suggested replacement text</NEW>
</SUGGESTION>

After all suggestions, add a brief overall summary of the chapter quality.
Provide at least 3-5 suggestions but be practical - don't suggest changes for the sake of it.`;

  try {
    let fullText = '';
    await callClaude([{ role:'user', content: `Here is the chapter content to review:\n\n${ch.content}` }], system, CONFIG.maxTokensDoc,
      (chunk, full) => {
        fullText = full;
        if (loadArea) loadArea.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><p style="color:var(--text3);" class="ui">Reviewing chapter... please wait.</p>`;
      });

    // Parse suggestions
    reviewSuggestions = [];
    const regex = /<SUGGESTION>\s*<REASON>([\s\S]*?)<\/REASON>\s*<OLD>([\s\S]*?)<\/OLD>\s*<NEW>([\s\S]*?)<\/NEW>\s*<\/SUGGESTION>/g;
    let match;
    while ((match = regex.exec(fullText)) !== null) {
      reviewSuggestions.push({ reason: match[1].trim(), old: match[2].trim(), new_: match[3].trim(), status: 'pending' });
    }

    // Extract summary (text after last </SUGGESTION>)
    const lastIdx = fullText.lastIndexOf('</SUGGESTION>');
    const summary = lastIdx >= 0 ? fullText.slice(lastIdx + 13).trim() : '';

    renderReviewResults(idx, reviewSuggestions, summary);
  } catch(e) {
    if (loadArea) loadArea.innerHTML = `<p style="color:var(--red)">Error: ${esc(e.message)} <button class="btn btn-gold btn-sm" onclick="generateReview(${idx},${JSON.stringify(notes)})">Retry</button></p>`;
  }
}

function renderReview(app) {
  const p = getProject();
  const idx = viewParams.chapterIdx;
  const ch = p?.chapters?.[idx];
  if (!p || !ch) return navigate('project');

  app.innerHTML = `
    <div class="header">
      <div class="logo" style="font-size:16px;">Review: Chapter ${ch.number} <span>${esc(ch.title)}</span></div>
      <div class="header-actions ui">
        <button class="btn btn-ghost btn-sm" onclick="cancelReview(${idx})">Cancel Review</button>
        <button class="btn btn-gold btn-sm" onclick="applyReview(${idx})">Apply Changes & Finish</button>
      </div>
    </div>
    <div class="main">
      <div class="content-area" style="padding:24px;">
        <div style="max-width:900px;margin:0 auto;">
          <div id="review-loading">
            <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
            <p style="color:var(--text3);" class="ui">AI is reviewing your chapter...</p>
          </div>
          <div id="review-results"></div>
        </div>
      </div>
    </div>
  `;
}

function renderReviewResults(idx, suggestions, summary) {
  const loadArea = document.getElementById('review-loading');
  if (loadArea) loadArea.style.display = 'none';
  const results = document.getElementById('review-results');
  if (!results) return;

  results.innerHTML = `
    <h3 style="color:var(--gold);margin-bottom:16px;">Review Complete — ${suggestions.length} Suggestion${suggestions.length!==1?'s':''}</h3>
    ${summary ? `<div class="card" style="margin-bottom:24px;"><p style="line-height:1.7;">${md(summary)}</p></div>` : ''}
    ${suggestions.map((s,i) => `
      <div class="review-item" id="review-${i}" style="${s.status!=='pending'?'opacity:0.6':''}">
        <div class="review-reason">${esc(s.reason)}</div>
        <div class="review-diff">
          <div class="review-old">
            <div class="review-label">Original</div>
            <div>${esc(s.old)}</div>
          </div>
          <div class="review-new">
            <div class="review-label">Suggested</div>
            <div>${esc(s.new_)}</div>
          </div>
        </div>
        <div class="review-actions">
          ${s.status === 'pending' ? `
            <button class="btn btn-ghost btn-sm" onclick="rejectSuggestion(${idx},${i})">Reject</button>
            <button class="btn btn-gold btn-sm" onclick="acceptSuggestion(${idx},${i})">Accept</button>
          ` : `
            <span class="sidebar-badge ${s.status==='accepted'?'badge-green':'badge-gray'}">${s.status}</span>
          `}
        </div>
      </div>
    `).join('')}
    <div style="text-align:center;margin-top:24px;">
      <button class="btn btn-gold" onclick="applyReview(${idx})">Apply Accepted Changes & Finish</button>
    </div>
  `;
}

function acceptSuggestion(idx, i) {
  reviewSuggestions[i].status = 'accepted';
  renderReviewResults(idx, reviewSuggestions, '');
}

function rejectSuggestion(idx, i) {
  reviewSuggestions[i].status = 'rejected';
  renderReviewResults(idx, reviewSuggestions, '');
}

function applyReview(idx) {
  const p = getProject();
  const ch = p.chapters[idx];
  let content = ch.content;

  // Apply accepted suggestions
  reviewSuggestions.filter(s => s.status === 'accepted').forEach(s => {
    content = content.replace(s.old, s.new_);
  });

  ch.content = content;
  ch.status = 'draft';
  ch.notes = [];
  saveProject();
  reviewSuggestions = [];
  navigate('chapter', { chapterIdx: idx });
}

function cancelReview(idx) {
  const p = getProject();
  p.chapters[idx].status = 'draft';
  saveProject();
  reviewSuggestions = [];
  navigate('chapter', { chapterIdx: idx });
}

async function finalizeChapter(idx) {
  showModal('Finalize Chapter?', 'This will mark the chapter as complete and update the continuity ledger, glossary, and voice profile.', [
    { label: 'Cancel', cls: 'btn-ghost' },
    { label: 'Finalize', cls: 'btn-gold', fn: () => doFinalizeChapter(idx) }
  ]);
}

async function doFinalizeChapter(idx) {
  const p = getProject();
  const ch = p.chapters[idx];
  ch.status = 'final';
  ch.versions.push({ content: ch.content, timestamp: new Date().toISOString(), label: 'Final version' });
  saveProject();

  // Show processing overlay
  const app = document.getElementById('app');
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `<div class="card" style="text-align:center;max-width:400px;">
    <div class="typing-indicator" style="justify-content:center;margin-bottom:12px;"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
    <p id="finalize-status" style="color:var(--text2);" class="ui">Updating continuity ledger...</p>
  </div>`;
  document.body.appendChild(overlay);

  try {
    // 1. Generate chapter summary
    const statusEl = overlay.querySelector('#finalize-status');
    statusEl.textContent = 'Generating chapter summary...';
    ch.summary = await callClaude([{ role:'user', content: `Summarize this chapter in 2-3 sentences:\n\n${ch.content.slice(0,8000)}` }], 'Write a brief summary capturing the key points and narrative of this chapter.', 500, null);
    saveProject();

    // 2. Update continuity ledger
    statusEl.textContent = 'Updating continuity ledger...';
    const ledgerPrompt = `Update the continuity ledger with details from Chapter ${ch.number}: "${ch.title}".

Current ledger:
${p.continuityLedger || '(empty - this is the first chapter)'}

Chapter content:
${ch.content.slice(0, 8000)}

Track: key facts, terminology, people/brands mentioned, opinions expressed, narrative threads, cross-references. Return the complete updated ledger.`;
    p.continuityLedger = await callClaude([{ role:'user', content: ledgerPrompt }], 'You maintain a continuity ledger for a book. Update it with new chapter details. Return the complete updated ledger.', CONFIG.maxTokensChat, null);
    saveProject();

    // 3. Update glossary
    statusEl.textContent = 'Updating glossary...';
    const existingTerms = p.glossary.map(g => g.term).join(', ');
    const glossaryResult = await callClaude([{ role:'user', content: `Extract domain-specific terms from this chapter that should be in a glossary. Existing terms (skip these): ${existingTerms || 'none yet'}.\n\nChapter:\n${ch.content.slice(0,6000)}\n\nReturn ONLY a JSON array: [{"term":"...","definition":"..."}]. If no new terms, return [].` }], 'Extract glossary-worthy terms. Return valid JSON only.', CONFIG.maxTokensChat, null);
    try {
      const match = glossaryResult.match(/\[[\s\S]*\]/);
      if (match) {
        const newTerms = JSON.parse(match[0]);
        if (Array.isArray(newTerms)) p.glossary.push(...newTerms);
      }
    } catch {}
    saveProject();

    // 4. Voice profile (after 2 chapters)
    const finalCount = p.chapters.filter(c => c.status === 'final').length;
    if (finalCount >= 2 && !p.voiceProfile) {
      statusEl.textContent = 'Creating voice profile...';
      const firstTwo = p.chapters.filter(c => c.status === 'final').slice(0, 2);
      const samples = firstTwo.map(c => c.content.slice(0, 3000)).join('\n\n---\n\n');
      p.voiceProfile = await callClaude([{ role:'user', content: `Analyze the writing style of these chapter samples and create a Voice Profile document.\n\n${samples}` }],
        'You are a literary analyst. Create a detailed voice profile covering: sentence structure patterns, vocabulary level, tone, rhythm, use of metaphor, paragraph structure, narrative voice (first/third person, formal/informal), and any distinctive stylistic traits. This profile will be used to maintain consistency.', CONFIG.maxTokensChat, null);
      saveProject();
    }
  } catch(e) {
    console.error('Finalize error:', e);
  }

  overlay.remove();
  navigate('project');
}
